# BirdNET Reolink Hummingbird Camera Job — Thor H00F
# Captures 30s audio from Reolink RLC-811A built-in mic every 10 minutes,
# classifies with BirdNET V2.4, publishes detections >= 0.60 confidence
# to Beehive with eBird seasonal geo-filtering.
#
# NOTE: Requires RTSP port to be reachable from H00F.
#       Default RTSP port is 554; may be mapped to a different port.
#       Check with: ffprobe -v quiet -show_streams "rtsp://..." 
#
# Submit: sesctl create --from-file jobs/birdnet-reolink.yaml
# Check:  sesctl stat birdnet-reolink
# Start:  sesctl sub birdnet-reolink
# Stop:   sesctl sus birdnet-reolink
# Remove: sesctl rm birdnet-reolink

name: birdnet-reolink
plugins:
  - name: birdnet-species
    pluginSpec:
      image: registry.sagecontinuum.org/flint-pete/birdnet-species:0.1.0
      args:
        - "--camera"
        # RTSP URL for Reolink RLC-811A audio
        # Update port if RTSP is mapped to a non-standard port
        - "RTSP_URL_HERE"
        - "--duration"
        - "30"
        - "--min-confidence"
        - "0.60"
nodes:
  H00F:
scienceRules:
  - "schedule(birdnet-species): cronjob('birdnet-reolink-cron', '*/10 * * * *')"
successcriteria:
  - WallClock('30day')
