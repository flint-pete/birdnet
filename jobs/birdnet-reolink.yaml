# BirdNET Reolink Hummingbird Camera Job — Thor H00F
# Captures 30s audio from Reolink RLC-811A built-in mic every 10 minutes,
# classifies with BirdNET V2.4, publishes detections >= 0.60 confidence
# to Beehive with eBird seasonal geo-filtering.
#
# IMPORTANT — Reolink auth: the BCS/FLV endpoint does NOT accept HTTP basic
#   auth (http://user:pass@ip/...). Credentials MUST be query parameters
#   (&user=...&password=...). Basic auth returns ffmpeg "End of file"/exit 187.
#
# Confirmed-working URL form (H00F hummingcam, Reolink RLC-811A):
#   http://10.107.0.221:10000/flv?port=1935&app=bcs&stream=channel0_sub.bcs&user=sage&password=SageCam!
#
# Sub-stream is 16 kHz audio -> use --bandpass-fmax 8000 (8 kHz Nyquist).
# Lat/lon auto-detected from node manifest. Week auto-calculated.
#
# Submit (verified sesctl syntax — flags differ from the website docs):
#   sesctl --server https://es.sagecontinuum.org --token "$SES_USER_TOKEN" create -f jobs/birdnet-reolink.yaml
#   sesctl --server https://es.sagecontinuum.org --token "$SES_USER_TOKEN" submit -j <numeric-job-id>
# Check:  sesctl ... stat -j <numeric-job-id>
# Suspend:sesctl ... rm -s <numeric-job-id>
# Remove: sesctl ... rm <numeric-job-id>   (must suspend first if Running)

name: birdnet-reolink
plugins:
  - name: birdnet-species
    pluginSpec:
      image: registry.sagecontinuum.org/beckman/birdnet-species:0.1.1
      args:
        - "--camera"
        # Reolink FLV/BCS URL — credentials as QUERY PARAMS, not basic auth.
        # Replace IP/port/user/password for your node's camera.
        - "http://10.107.0.221:10000/flv?port=1935&app=bcs&stream=channel0_sub.bcs&user=sage&password=SageCam!"
        - "--duration"
        - "30"
        - "--min-confidence"
        - "0.60"
        - "--bandpass-fmax"
        - "8000"
nodes:
  H00F:
scienceRules:
  - "schedule(birdnet-species): cronjob('birdnet-reolink-cron', '*/10 * * * *')"
successcriteria:
  - WallClock('30day')
