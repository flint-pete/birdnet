name: "birdnet-species"
description: "Records audio, identifies bird/frog/insect species using BirdNET V2.4, publishes detections"
version: "0.1.0"
namespace: "sage"
authors: "Pete Beckman <beckman@deepiron.com>"
collaborators: "Dario Dematties (original avian-diversity-monitoring plugin)"
license: "MIT (code), CC BY-NC-SA 4.0 (BirdNET models)"
homepage: "https://github.com/flint-pete/birdnet"
keywords: "microphone, birdsong, bird classification, avian diversity, bioacoustics, BirdNET"
funding: "NSF 2436842"
source:
  architectures:
    - linux/arm64
    - linux/amd64
  url: "https://github.com/flint-pete/birdnet.git"
  branch: "main"

inputs:
# Audio input
- id: "input"
  type: "string"
- id: "camera"
  type: "string"
- id: "duration"
  type: "float"
- id: "sample-rate"
  type: "int"
# Model parameters
- id: "min-confidence"
  type: "float"
- id: "sensitivity"
  type: "float"
- id: "overlap"
  type: "float"
- id: "top-k"
  type: "int"
- id: "bandpass-fmin"
  type: "int"
- id: "bandpass-fmax"
  type: "int"
- id: "batch-size"
  type: "int"
# Location filtering
- id: "lat"
  type: "float"
- id: "lon"
  type: "float"
- id: "week"
  type: "int"
- id: "sf-thresh"
  type: "float"
# Runtime
- id: "num-recordings"
  type: "int"
- id: "interval"
  type: "float"

metadata:
  ontology: env.detection.audio.*
